openapi: 3.0.3
info:
  title: Banca Empresas API
  version: 0.1.0
  description: |
    API del pipeline de venta de Tarjeta de Crédito **LATAM Business** para Banca Empresas
    (Banco de Bogotá).

    ## Endpoints expuestos actualmente

    | Método | Ruta | Descripción |
    |--------|------|-------------|
    | `GET` | `/health` | Health check del servicio |
    | `POST` | `/api/power-apps/submit` | Simulador de Power App con comprobación de campos |
    | `GET` | `/api/sales-calls/health` | Health check de la feature de llamadas |
    | `POST` | `/api/sales-calls/calls` | Inicia una llamada de venta vía Fonema.ia |
    | `GET` | `/api/sales-calls/calls` | Lista las llamadas registradas |
    | `GET` | `/api/sales-calls/calls/{id}` | Detalle de una llamada (transcript, análisis) |
    | `GET` | `/api/sales-calls/calls/{id}/recording` | Proxy de la grabación de audio (con Range) |
    | `GET` | `/api/sales-calls/calls/{id}/handoff` | Prefill para la Power App de una llamada calificada |
    | `POST` | `/api/sales-calls/batches` | Crear campaña (batch calling) con política de pacing |
    | `GET` | `/api/sales-calls/batches` | Listar campañas |
    | `GET` | `/api/sales-calls/batches/{id}` | Progreso agregado de una campaña (polling) |
    | `GET` | `/api/sales-calls/batches/{id}/items` | Items (llamadas) de una campaña |
    | `POST` | `/api/sales-calls/batches/{id}/{action}` | Pausar / reanudar / cancelar una campaña |
    | `POST` | `/api/sales-calls/cron/dispatch` | Dispatcher progressive (Vercel Cron) |
    | `POST` | `/api/sales-calls/webhooks/fonema/call-update` | Webhook Fonema: cambio de estado |
    | `POST` | `/api/sales-calls/webhooks/fonema/end-of-call` | Webhook Fonema: fin de llamada |
    | `POST` | `/api/sales-calls/webhooks/fonema/end-of-session` | Webhook Fonema: fin de sesión |

    Otras etapas del pipeline (`file-matching`, `delivery-confirmation`, etc.)
    se documentarán aquí conforme se expongan.

    ## Power App — comprobación de campos

    El simulador valida la solicitud completa: campos obligatorios, formatos, coherencia
    entre secciones (empresa, tarjetahabiente, cupo, entrega, Cámara de Comercio, producto)
    y reglas de negocio. Cada problema se reporta con código, campo, mensaje y sugerencia
    de corrección cuando aplica.

    ## Sales Calls — llamadas de venta (Fonema.ia)

    Etapa `sales-calls` del pipeline. Se dispara una llamada saliente con un agente de voz
    (Fonema.ia) que verifica identidad del representante (nombre, empresa, NIT) y ofrece la
    TC LATAM Business. El resultado (grabación, transcripción y variables de análisis como
    `identidad_verificada`, `cliente_interesado`) llega de forma asíncrona por los webhooks
    de Fonema. La grabación se sirve vía proxy autenticado para no exponer la API key al
    cliente. Los ejemplos usan datos sintéticos; nunca datos reales de clientes.

    ## Sales Calls — batch calling (campañas)

    Sobre la llamada individual se construye la capa de campaña: se sube una lista de leads
    + una política de **pacing** y el backend la encola en Supabase. Un dispatcher
    **progressive** (invocado por Vercel Cron) drena la cola respetando dos perillas
    independientes — concurrencia (`maxConcurrent`) y throughput (`perHour`) — y una ventana
    de contacto. El cliente no dispara N llamadas: consulta el progreso agregado por polling
    en `GET /batches/{id}`. Es idempotente por `leadId` (no re-marca) y controlable
    (pausar / reanudar / cancelar). Cuando un item cierra CALIFICADO, su llamada queda
    disponible para handoff a la Power App vía `GET /calls/{id}/handoff`.

  contact:
    name: Banca Empresas — Hackathon
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000
    description: Desarrollo local

tags:
  - name: Health
    description: Verificación de disponibilidad del servicio
  - name: Power Apps
    description: Simulador de solicitud TC LATAM Business
  - name: Sales Calls
    description: Llamadas de venta agénticas vía Fonema.ia y webhooks de resultado

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check global
      operationId: getHealth
      responses:
        '200':
          description: Servicio operativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalHealthResponse'
              example:
                status: ok
                service: banca-empresas-backend

  /api/power-apps/submit:
    post:
      tags: [Power Apps]
      summary: Enviar solicitud de TC LATAM Business
      description: |
        Simula el diligenciamiento de la Power App tras una venta cerrada en call center.
        Ejecuta comprobación integral de campos y reglas de negocio.

        **Decisiones posibles:**

        | Decisión | HTTP | Descripción |
        |----------|------|-------------|
        | `APROBADO` | 201 | Sin errores bloqueantes; genera radicado GOPTC |
        | `DEVUELTO` | 422 | Errores corregibles en uno o más campos |
        | `RECHAZADO` | 422 | Errores bloqueantes de negocio |
        | `RECHAZADO` | 400 | Payload con formato inválido o campos faltantes |

        **Códigos de validación (`issues[].code`):**

        - `REQUIRED_FIELD` — Campo obligatorio ausente
        - `INVALID_FORMAT` — Formato o tipo incorrecto
        - `FIELD_SWAP_NIT_CEDULA` — Identificaciones en campos invertidos
        - `DUPLICATE_IDENTIFICATION` — Misma identificación en empresa y tarjetahabiente
        - `CUPO_EXCEDE_DISPONIBLE` — Cupo solicitado mayor al disponible CEC
        - `CUPO_INVALIDO` — Cupo no válido
        - `PRODUCTO_INVALIDO` — Producto no permitido en la campaña
        - `AGENDAMIENTO_FIN_DE_SEMANA` — Entrega agendada sábado o domingo
        - `AGENDAMIENTO_PASADO` — Fecha de agendamiento en el pasado
        - `CAMARA_COMERCIO_REQUERIDA` — Certificado de Cámara de Comercio faltante
        - `CAMARA_COMERCIO_NIT_NO_COINCIDE` — NIT del PDF no coincide con la empresa
        - `SEGMENTO_NO_ELEGIBLE` — Segmento fuera de campaña
        - `MISSING_TARJETAHABIENTE_DATA` — Datos incompletos del tarjetahabiente
      operationId: submitPowerApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PowerAppSubmitRequest'
            examples:
              aprobado:
                summary: Solicitud válida
                value:
                  leadId: lead-demo-001
                  campana: Campaña Venta TC PJ Call Center
                  empresa:
                    nit: '8000194370'
                    razonSocial: CORRUGADOS DEL DARIEN S.A.S
                    segmento: Corporativo
                    ciudad: Bogotá
                    direccion: Calle 100 # 15-20
                  tarjetahabiente:
                    tipoDocumento: CC
                    numeroDocumento: '10538625'
                    nombres: JORGE
                    apellidos: ROSAS
                    cargo: Gerente General
                    email: jorge.rosas@empresa.com
                    telefono: '3001234567'
                  cupo:
                    solicitado: 1000000000
                    disponibleCec: 14980000000
                  entrega:
                    tipo: comercial
                    ciudad: Bogotá
                    direccion: Calle 100 # 15-20
                    fechaAgendamiento: '2026-07-15'
                  camaraComercio:
                    archivoNombre: camara_8000194370.pdf
                    nitCertificado: '8000194370'
                    fechaExpedicion: '2026-01-15'
                  producto:
                    codigo: TC_LATAM_BUSINESS
                    franquicia: VISA
                  asesorId: asesor-call-001
              camposIncorrectos:
                summary: Campos con errores de coherencia
                value:
                  empresa:
                    nit: '10538625'
                    razonSocial: CORRUGADOS DEL DARIEN S.A.S
                    segmento: Corporativo
                    ciudad: Bogotá
                    direccion: Calle 100 # 15-20
                  tarjetahabiente:
                    tipoDocumento: CC
                    numeroDocumento: '8000194370'
                    nombres: JORGE
                    apellidos: ROSAS
                    cargo: Gerente General
                    email: jorge.rosas@empresa.com
                    telefono: '3001234567'
                  cupo:
                    solicitado: 1000000000
                  entrega:
                    tipo: comercial
                    ciudad: Bogotá
                    direccion: Calle 100 # 15-20
                    fechaAgendamiento: '2026-07-15'
                  camaraComercio:
                    archivoNombre: camara.pdf
                  producto:
                    codigo: TC_LATAM_BUSINESS
                    franquicia: VISA
      responses:
        '201':
          description: Solicitud aprobada — operaciones puede iniciar realce
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PowerAppSubmitResponse'
              example:
                caseId: ad827940-aa07-4f27-8086-539b03a15c9c
                decision: APROBADO
                valid: true
                radicado: GOPTC-2026-B678F1A5
                issues: []
                summary: Solicitud aprobada. Operaciones puede iniciar realce y armado de carpeta.
                siguientePaso: Operaciones procesará realce, fabricación y armado de carpeta. Operaciones entregará la carpeta al gerente de relaciones, quien hará entrega de las tarjetas al gerente de la empresa solicitante.
                submittedAt: '2026-07-09T17:00:03.141Z'
        '400':
          description: Payload inválido — campos obligatorios o formato incorrecto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PowerAppValidationErrorResponse'
              example:
                decision: RECHAZADO
                valid: false
                radicado: null
                issues:
                  - code: REQUIRED_FIELD
                    field: empresa.razonSocial
                    message: La razón social es obligatoria
                    severity: error
                summary: La solicitud no cumple el formato esperado de la Power App.
                siguientePaso: Revise los campos obligatorios y el formato de la solicitud.
        '422':
          description: Comprobación de campos o reglas de negocio fallida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PowerAppSubmitResponse'
              examples:
                devuelto:
                  summary: Campos corregibles
                  value:
                    caseId: 258d3216-e3f1-4c22-a3d5-721519883568
                    decision: DEVUELTO
                    valid: false
                    radicado: null
                    issues:
                      - code: FIELD_SWAP_NIT_CEDULA
                        field: empresa.nit
                        message: Parece que el NIT de la empresa y el documento del tarjetahabiente están invertidos.
                        severity: error
                        suggestion: 'Intercambie los valores: use 8000194370 como NIT de empresa y 10538625 como documento del tarjetahabiente.'
                    summary: 'Solicitud devuelta: se detectaron errores corregibles en los campos reportados.'
                    siguientePaso: Corrija los campos señalados y vuelva a enviar la solicitud.
                    submittedAt: '2026-07-09T17:00:03.165Z'
                rechazado:
                  summary: Regla de negocio bloqueante
                  value:
                    caseId: 7f3a2b1c-4d5e-6f78-9012-3456789abcde
                    decision: RECHAZADO
                    valid: false
                    radicado: null
                    issues:
                      - code: CUPO_EXCEDE_DISPONIBLE
                        field: cupo.solicitado
                        message: El cupo solicitado supera el disponible reportado en CEC.
                        severity: error
                        suggestion: El cupo máximo disponible es 14.980.000.000.
                    summary: 'Solicitud rechazada: se encontraron errores que impiden continuar.'
                    siguientePaso: Revise los errores reportados antes de reintentar.
                    submittedAt: '2026-07-09T17:00:03.165Z'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales-calls/health:
    get:
      tags: [Sales Calls]
      summary: Health check de la feature de llamadas
      operationId: getSalesCallsHealth
      responses:
        '200':
          description: Feature operativa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesCallsHealthResponse'
              example:
                feature: sales-calls
                status: ok
                provider: fonema.ia

  /api/sales-calls/calls:
    get:
      tags: [Sales Calls]
      summary: Listar llamadas
      description: Devuelve las llamadas registradas, ordenadas de más reciente a más antigua.
      operationId: listSalesCalls
      responses:
        '200':
          description: Listado de llamadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Call'
    post:
      tags: [Sales Calls]
      summary: Iniciar llamada de venta
      description: |
        Dispara una llamada saliente con el agente de voz (Fonema.ia) al número indicado.
        La respuesta `202` confirma el encolado con estado `queued`; el resultado final
        (grabación, transcripción, análisis) llega después por los webhooks de Fonema.
      operationId: initiateSalesCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateCallRequest'
            example:
              phoneNumber: '+573001234567'
              customerName: Representante Demo
              variables:
                empresa: Empresa Demo SAS
                nit: '9001234567'
      responses:
        '202':
          description: Llamada encolada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
        '400':
          description: Payload inválido — formato de teléfono u otros campos incorrectos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: phoneNumber debe estar en formato E.164, ej. +573001234567
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales-calls/calls/{id}:
    get:
      tags: [Sales Calls]
      summary: Detalle de una llamada
      operationId: getSalesCall
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador interno de la llamada
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalle de la llamada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
        '404':
          description: Llamada no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: NOT_FOUND
                  message: Llamada no encontrada

  /api/sales-calls/calls/{id}/recording:
    get:
      tags: [Sales Calls]
      summary: Grabación de la llamada (proxy)
      description: |
        Sirve el audio de la grabación descargándolo de Fonema con la API key en el backend
        (no se expone la credencial al cliente). Soporta `Range` para permitir seek en el
        reproductor (responde `206 Partial Content`).
      operationId: getSalesCallRecording
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Range
          in: header
          required: false
          description: Rango de bytes solicitado, ej. `bytes=0-500000`
          schema:
            type: string
      responses:
        '200':
          description: Audio completo
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        '206':
          description: Fragmento de audio (respuesta a un Range)
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        '404':
          description: Grabación no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '416':
          description: Rango solicitado no satisfacible

  /api/sales-calls/webhooks/fonema/call-update:
    post:
      tags: [Sales Calls]
      summary: Webhook Fonema — actualización de estado
      description: Recibido en tiempo real cuando cambia el estado de la llamada (`initiated`, `in-progress`).
      operationId: fonemaCallUpdateWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FonemaCallUpdateWebhook'
      responses:
        '204':
          description: Evento procesado (sin contenido)

  /api/sales-calls/webhooks/fonema/end-of-call:
    post:
      tags: [Sales Calls]
      summary: Webhook Fonema — fin de llamada
      description: |
        Recibido al terminar una llamada. Trae grabación, transcripción y análisis
        (`successEvaluation`, `structuredData`). Se correlaciona con la llamada por `session.id`.
      operationId: fonemaEndOfCallWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FonemaEndOfCallWebhook'
      responses:
        '204':
          description: Evento procesado (sin contenido)

  /api/sales-calls/webhooks/fonema/end-of-session:
    post:
      tags: [Sales Calls]
      summary: Webhook Fonema — fin de sesión
      description: Recibido cuando se agotan los reintentos de marcación hacia un cliente.
      operationId: fonemaEndOfSessionWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FonemaEndOfSessionWebhook'
      responses:
        '204':
          description: Evento reconocido (sin contenido)

  /api/sales-calls/batches:
    post:
      tags: [Sales Calls]
      summary: Crear campaña (batch calling)
      description: |
        Crea una campaña de llamadas: sube la lista de leads + una política de pacing y
        el backend la encola. Un dispatcher **progressive** (Vercel Cron) la drena
        respetando concurrencia (`maxConcurrent`), throughput (`perHour`) y ventana de
        contacto. El cliente NO dispara N llamadas: consulta el progreso agregado por
        polling en `GET /batches/{id}`. Idempotente por `leadId` dentro del batch.
        Los campos de `pacing` omitidos toman los defaults del servidor.
      operationId: createCallBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallBatchRequest'
            example:
              name: Campaña TC LATAM Business — Julio
              leads:
                - leadId: lead-demo-001
                  phoneNumber: '+573001112233'
                  customerName: María Restrepo
                  variables:
                    razonSocial: CORRUGADOS DEL DARIEN S.A.S
                    nit: '8000194370'
                - leadId: lead-demo-002
                  phoneNumber: '+573004445566'
              pacing:
                maxConcurrent: 20
                perHour: 60
                businessHours: { startHour: 8, endHour: 20 }
                timezone: America/Bogota
      responses:
        '201':
          description: Campaña creada y encolada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallBatch'
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Sales Calls]
      summary: Listar campañas
      operationId: listCallBatches
      responses:
        '200':
          description: Lista de campañas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CallBatch'

  /api/sales-calls/batches/{id}:
    get:
      tags: [Sales Calls]
      summary: Progreso agregado de una campaña (polling)
      operationId: getCallBatch
      parameters:
        - $ref: '#/components/parameters/BatchId'
      responses:
        '200':
          description: Progreso de la campaña
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallBatchProgress'
        '404':
          description: Campaña no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales-calls/batches/{id}/items:
    get:
      tags: [Sales Calls]
      summary: Items (llamadas) de una campaña
      operationId: listCallBatchItems
      parameters:
        - $ref: '#/components/parameters/BatchId'
      responses:
        '200':
          description: Items de la campaña con su estado por llamada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CallBatchItem'
        '404':
          description: Campaña no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales-calls/batches/{id}/{action}:
    post:
      tags: [Sales Calls]
      summary: Controlar el ciclo de vida de una campaña
      description: Pausa, reanuda o cancela la campaña. Una campaña pausada no es drenada por el dispatcher.
      operationId: setCallBatchStatus
      parameters:
        - $ref: '#/components/parameters/BatchId'
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [pause, resume, cancel]
      responses:
        '200':
          description: Campaña actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallBatch'
        '400':
          description: Transición inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Campaña no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales-calls/calls/{id}/handoff:
    get:
      tags: [Sales Calls]
      summary: Prefill para la Power App (handoff de una llamada calificada)
      description: |
        Cuando una llamada cierra CALIFICADA (identidad verificada + cliente interesado),
        devuelve el prefill de la solicitud con la forma de `POST /api/power-apps/submit`.
        El front lo usa para pre-diligenciar el formulario. Responde 404 si la llamada no
        existe o no está calificada.
      operationId: getCallHandoff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Prefill de la Power App
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PowerAppPrefill'
        '404':
          description: Llamada inexistente o no calificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales-calls/cron/dispatch:
    post:
      tags: [Sales Calls]
      summary: Dispatcher progressive (invocado por Vercel Cron)
      description: |
        Drena las campañas `running`: por cada una calcula el headroom
        `min(maxConcurrent − activos, perHour − arrancadas_última_hora, en_cola)`,
        hace claim atómico de esa cantidad de items en cola y dispara sus llamadas.
        Protegido con `Authorization: Bearer $CRON_SECRET`. Existe variante `GET` para pruebas.
      operationId: dispatchCallBatches
      security:
        - cronSecret: []
      responses:
        '200':
          description: Resultado del tick de dispatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchResult'
        '401':
          description: Secret de cron inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    GlobalHealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          example: banca-empresas-backend

    PowerAppSubmitRequest:
      type: object
      required:
        - empresa
        - tarjetahabiente
        - cupo
        - entrega
        - camaraComercio
        - producto
      properties:
        leadId:
          type: string
          description: Identificador interno del lead en el pipeline
          example: lead-demo-001
        campana:
          type: string
          description: Nombre de la campaña comercial
          example: Campaña Venta TC PJ Call Center
        empresa:
          $ref: '#/components/schemas/Empresa'
        tarjetahabiente:
          $ref: '#/components/schemas/Tarjetahabiente'
        cupo:
          $ref: '#/components/schemas/Cupo'
        entrega:
          $ref: '#/components/schemas/Entrega'
        camaraComercio:
          $ref: '#/components/schemas/CamaraComercio'
        producto:
          $ref: '#/components/schemas/Producto'
        asesorId:
          type: string
          description: Identificador del asesor del call center
          example: asesor-call-001

    Empresa:
      type: object
      required: [nit, razonSocial, segmento, ciudad, direccion]
      properties:
        nit:
          type: string
          description: NIT de la persona jurídica
          example: '8000194370'
        razonSocial:
          type: string
          example: CORRUGADOS DEL DARIEN S.A.S
        segmento:
          type: string
          description: 'Segmento Banca Empresas: Pyme Pequeña, Pyme Mediana, Empresarial 1, Corporativo, etc.'
          example: Corporativo
        ciudad:
          type: string
          example: Bogotá
        direccion:
          type: string
          example: 'Calle 100 # 15-20'

    Tarjetahabiente:
      type: object
      required:
        - tipoDocumento
        - numeroDocumento
        - nombres
        - apellidos
        - cargo
        - email
        - telefono
      properties:
        tipoDocumento:
          type: string
          enum: [CC, CE, PA, TI]
          description: Tipo de documento de la persona natural designada
        numeroDocumento:
          type: string
          description: Documento de identidad de la persona natural
          example: '10538625'
        nombres:
          type: string
          example: JORGE
        apellidos:
          type: string
          example: ROSAS
        cargo:
          type: string
          example: Gerente General
        email:
          type: string
          format: email
          example: jorge.rosas@empresa.com
        telefono:
          type: string
          description: Celular colombiano (10 dígitos, inicia en 3)
          example: '3001234567'

    Cupo:
      type: object
      required: [solicitado]
      properties:
        solicitado:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Cupo de crédito solicitado para la tarjeta
          example: 1000000000
        disponibleCec:
          type: number
          format: double
          minimum: 0
          description: Cupo disponible reportado en CEC (opcional, usado para validación)
          example: 14980000000

    Entrega:
      type: object
      description: |
        Logística acordada al radicar la solicitud. No modela el tracking posterior
        (operaciones → gerente de relaciones → gerente de empresa).
      required: [tipo, ciudad, direccion, fechaAgendamiento]
      properties:
        tipo:
          type: string
          enum: [courier, comercial]
          description: |
            `comercial` — entrega coordinada por gerente de relaciones.
            `courier` — envío certificado a la dirección indicada.
        ciudad:
          type: string
          example: Bogotá
        direccion:
          type: string
          example: 'Calle 100 # 15-20'
        fechaAgendamiento:
          type: string
          format: date
          description: Solo días hábiles (lunes a viernes)
          example: '2026-07-15'

    CamaraComercio:
      type: object
      required: [archivoNombre]
      properties:
        archivoNombre:
          type: string
          description: Nombre del archivo PDF del certificado de Cámara de Comercio
          example: camara_8000194370.pdf
        nitCertificado:
          type: string
          description: NIT extraído del certificado; debe coincidir con empresa.nit
          example: '8000194370'
        fechaExpedicion:
          type: string
          format: date
          example: '2026-01-15'

    Producto:
      type: object
      required: [codigo, franquicia]
      properties:
        codigo:
          type: string
          enum: [TC_LATAM_BUSINESS]
          example: TC_LATAM_BUSINESS
        franquicia:
          type: string
          example: VISA

    ValidationIssue:
      type: object
      required: [code, field, message, severity]
      properties:
        code:
          type: string
          enum:
            - REQUIRED_FIELD
            - INVALID_FORMAT
            - FIELD_SWAP_NIT_CEDULA
            - DUPLICATE_IDENTIFICATION
            - CUPO_EXCEDE_DISPONIBLE
            - CUPO_INVALIDO
            - PRODUCTO_INVALIDO
            - AGENDAMIENTO_FIN_DE_SEMANA
            - AGENDAMIENTO_PASADO
            - CAMARA_COMERCIO_REQUERIDA
            - CAMARA_COMERCIO_NIT_NO_COINCIDE
            - SEGMENTO_NO_ELEGIBLE
            - MISSING_TARJETAHABIENTE_DATA
        field:
          type: string
          description: Ruta del campo con error (notación punto)
          example: empresa.nit
        message:
          type: string
        severity:
          type: string
          enum: [error, warning]
        suggestion:
          type: string
          description: Acción recomendada para corregir el error

    PowerAppSubmitResponse:
      type: object
      required:
        - caseId
        - decision
        - valid
        - radicado
        - issues
        - summary
        - siguientePaso
        - submittedAt
      properties:
        caseId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [APROBADO, RECHAZADO, DEVUELTO]
        valid:
          type: boolean
        radicado:
          type: string
          nullable: true
          description: 'Radicado GOPTC generado solo si decision = APROBADO. Formato: GOPTC-YYYY-XXXXXXXX'
          example: GOPTC-2026-B678F1A5
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        summary:
          type: string
        siguientePaso:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time

    PowerAppValidationErrorResponse:
      type: object
      required: [decision, valid, radicado, issues, summary, siguientePaso]
      properties:
        decision:
          type: string
          enum: [RECHAZADO]
        valid:
          type: boolean
          example: false
        radicado:
          type: 'null'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'
        summary:
          type: string
        siguientePaso:
          type: string

    SalesCallsHealthResponse:
      type: object
      required: [feature, status, provider]
      properties:
        feature:
          type: string
          enum: [sales-calls]
        status:
          type: string
          enum: [ok]
        provider:
          type: string
          example: fonema.ia

    InitiateCallRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          pattern: '^\+\d{8,15}$'
          description: Número del cliente en formato E.164
          example: '+573001234567'
        customerName:
          type: string
          maxLength: 200
          description: Nombre del representante a contactar (se inyecta como variable del agente)
          example: Representante Demo
        customerEmail:
          type: string
          format: email
        script:
          type: string
          maxLength: 5000
          description: Guion opcional; se envía como variable `script` al agente
        variables:
          type: object
          additionalProperties:
            type: string
          description: Variables del agente (ej. empresa, nit) para verificar identidad
          example:
            empresa: Empresa Demo SAS
            nit: '9001234567'
        delaySeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: Segundos de espera antes de iniciar la llamada

    TranscriptMessage:
      type: object
      required: [role, message]
      properties:
        role:
          type: string
          description: 'Emisor del turno: bot/agent (agente) o user (cliente)'
          example: user
        message:
          type: string
          example: Sí, me interesa adquirirla

    Call:
      type: object
      description: Estado y resultado de una llamada de venta.
      required: [id, agentId, phoneNumber, variables, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno de la llamada
        sessionId:
          type: string
          description: Id de sesión de Fonema (correlación con webhooks)
        fonemaCallId:
          type: string
          description: Id de llamada de Fonema (llega en fin-de-llamada)
        agentId:
          type: string
          example: soui-XXXXXXXX
        phoneNumber:
          type: string
          example: '+573001234567'
        customerName:
          type: string
          example: Representante Demo
        customerEmail:
          type: string
          format: email
        variables:
          type: object
          additionalProperties:
            type: string
          example:
            empresa: Empresa Demo SAS
            nit: '9001234567'
        status:
          type: string
          enum: [queued, initiated, in_progress, completed, failed]
        recordingUrl:
          type: string
          description: URL de la grabación en Fonema (requiere API key; usar el proxy)
        detailsUrl:
          type: string
          description: Enlace para ver el detalle en Fonema
        transcript:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptMessage'
        summary:
          type: string
          description: Resumen automático de la llamada
        endedReason:
          type: string
          example: customer-ended-call
        durationSeconds:
          type: integer
          example: 156
        successEvaluation:
          oneOf:
            - type: boolean
            - type: string
          description: Criterio de éxito evaluado por el agente (Fonema puede enviarlo como texto)
          example: 'true'
        structuredData:
          type: object
          additionalProperties: true
          description: Variables de salida del agente
          example:
            identidad_verificada: Verdadero
            cliente_interesado: Verdadero
            motivo_no_interes: No aplica
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FonemaCallUpdateWebhook:
      type: object
      description: Payload del webhook de actualización de llamada de Fonema.
      properties:
        event:
          type: string
          example: call.updated
        status:
          type: string
          enum: [initiated, in-progress]
        timestamp:
          type: string
          format: date-time
        call:
          type: object
          properties:
            id:
              type: string
        customer:
          type: object
          properties:
            name:
              type: string
            phoneNumber:
              type: string

    FonemaEndOfCallWebhook:
      type: object
      description: Payload del webhook de fin de llamada de Fonema (grabación, transcript, análisis).
      properties:
        id:
          type: string
        session:
          type: object
          properties:
            id:
              type: string
        endedReason:
          type: string
        durationSeconds:
          type: integer
        recordingURL:
          type: string
        detailsURL:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptMessage'
        analysis:
          type: object
          properties:
            successEvaluation:
              oneOf:
                - type: boolean
                - type: string
            structuredData:
              type: object
              additionalProperties: true
            summary:
              type: string

    FonemaEndOfSessionWebhook:
      type: object
      description: Payload del webhook de fin de sesión de Fonema (reintentos agotados).
      properties:
        customer:
          type: object
          properties:
            name:
              type: string
            phoneNumber:
              type: string
        totalAttempts:
          type: integer
        endedReason:
          type: string
        analysis:
          type: object
          properties:
            successEvaluation:
              oneOf:
                - type: boolean
                - type: string
            structuredData:
              type: object
              additionalProperties: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INTERNAL_ERROR
            message:
              type: string
              example: An unexpected error occurred

    PacingPolicy:
      type: object
      description: |
        Política de ritmo. Dos perillas independientes (concurrencia y throughput) +
        ventana de contacto. La ventana y el ritmo son control de cumplimiento
        (habeas data / horarios de contacto), no solo UX.
      required: [maxConcurrent, perHour, timezone]
      properties:
        maxConcurrent:
          type: integer
          minimum: 1
          maximum: 500
          description: Slots simultáneos. Techo real = concurrencia de la cuenta Fonema (~500).
          example: 20
        perHour:
          type: integer
          minimum: 1
          description: Máximo de llamadas arrancadas por hora (throughput).
          example: 60
        earliestAt:
          type: string
          format: date-time
          description: No marcar antes de este instante (opcional).
        latestAt:
          type: string
          format: date-time
          description: No marcar después de este instante (opcional).
        businessHours:
          type: object
          nullable: true
          properties:
            startHour:
              type: integer
              minimum: 0
              maximum: 23
              example: 8
            endHour:
              type: integer
              minimum: 1
              maximum: 24
              example: 20
        timezone:
          type: string
          example: America/Bogota

    BatchLead:
      type: object
      required: [leadId, phoneNumber]
      properties:
        leadId:
          type: string
          description: Identificador del lead. Idempotencia por (batch, leadId).
          example: lead-demo-001
        phoneNumber:
          type: string
          description: Teléfono en formato E.164.
          example: '+573001112233'
        customerName:
          type: string
          example: María Restrepo
        customerEmail:
          type: string
          format: email
        variables:
          type: object
          additionalProperties:
            type: string
          description: Variables inyectadas al agente Fonema para esta llamada.

    CreateCallBatchRequest:
      type: object
      required: [name, leads]
      properties:
        name:
          type: string
          example: Campaña TC LATAM Business — Julio
        agentId:
          type: string
          description: Agente Fonema. Si se omite, usa FONEMA_SALES_AGENT_ID.
        leads:
          type: array
          minItems: 1
          maxItems: 5000
          items:
            $ref: '#/components/schemas/BatchLead'
        pacing:
          $ref: '#/components/schemas/PacingPolicy'
        defaultVariables:
          type: object
          additionalProperties:
            type: string
          description: Variables aplicadas a todas las llamadas (mezcladas con las del lead).

    CallBatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        agentId:
          type: string
        status:
          type: string
          enum: [running, paused, completed, cancelled]
        pacing:
          $ref: '#/components/schemas/PacingPolicy'
        defaultVariables:
          type: object
          additionalProperties:
            type: string
        total:
          type: integer
          example: 2
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CallBatchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batchId:
          type: string
          format: uuid
        leadId:
          type: string
        phoneNumber:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        variables:
          type: object
          additionalProperties:
            type: string
        status:
          type: string
          enum: [queued, dialing, in_progress, completed, failed, skipped]
        callId:
          type: string
          format: uuid
          nullable: true
        sessionId:
          type: string
          nullable: true
        qualified:
          type: boolean
          nullable: true
          description: true si la llamada cerró calificada (apta para handoff a power-apps).
        attempts:
          type: integer
        lastError:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BatchCounts:
      type: object
      properties:
        queued:
          type: integer
        dialing:
          type: integer
        in_progress:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        total:
          type: integer

    CallBatchProgress:
      type: object
      properties:
        batch:
          $ref: '#/components/schemas/CallBatch'
        counts:
          $ref: '#/components/schemas/BatchCounts'
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: (completed + failed + skipped) / total
          example: 0.5

    DispatchResult:
      type: object
      properties:
        batchesConsidered:
          type: integer
          example: 1
        dialed:
          type: integer
          description: Llamadas efectivamente disparadas en este tick.
          example: 20
        completedBatches:
          type: integer
          example: 0

    PowerAppPrefill:
      type: object
      description: |
        Handoff de una llamada calificada hacia la Power App. Subconjunto parcial de
        `PowerAppSubmitRequest` con lo conocido desde la llamada; el asesor completa el
        resto (Cámara de Comercio, agendamiento de entrega).
      required: [origenLlamada]
      properties:
        leadId:
          type: string
          example: lead-demo-001
        campana:
          type: string
        empresa:
          type: object
          properties:
            nit: { type: string, example: '8000194370' }
            razonSocial: { type: string, example: CORRUGADOS DEL DARIEN S.A.S }
            segmento: { type: string }
            ciudad: { type: string }
            direccion: { type: string }
        tarjetahabiente:
          type: object
          properties:
            tipoDocumento: { type: string, enum: [CC, CE, PA, TI] }
            numeroDocumento: { type: string }
            nombres: { type: string, example: María }
            apellidos: { type: string, example: Restrepo }
            cargo: { type: string }
            email: { type: string }
            telefono: { type: string, example: '+573001112233' }
        cupo:
          type: object
          properties:
            solicitado: { type: number }
            disponibleCec: { type: number }
        producto:
          type: object
          properties:
            codigo: { type: string, example: TC_LATAM_BUSINESS }
            franquicia: { type: string, example: VISA }
        origenLlamada:
          type: object
          required: [callId]
          properties:
            callId: { type: string, format: uuid }
            sessionId: { type: string }
            resumen: { type: string }
            grabacionUrl: { type: string }
            finalizadaEn: { type: string, format: date-time }

  parameters:
    BatchId:
      name: id
      in: path
      required: true
      description: Identificador de la campaña
      schema:
        type: string
        format: uuid

  securitySchemes:
    cronSecret:
      type: http
      scheme: bearer
      description: Bearer $CRON_SECRET inyectado por Vercel Cron.
