# Supabase local / CLI. Sustituye project_id al vincular tu proyecto remoto:
#   supabase link --project-ref <tu-project-ref>
project_id = "banca-empresas-backend"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

# NOTA: config.toml SOLO configura el stack LOCAL (`supabase start`). La config
# del proyecto remoto (site_url y redirect URLs de producción, y habilitar
# Google) se gestiona en el dashboard de Supabase, no aquí.
[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = [
  "http://localhost:4200",
  "http://localhost:4200/auth/callback",
]

# Inicio de sesión con Google en el stack local. Los valores sensibles se leen de
# variables de entorno (`supabase/.env`, ignorado por git); nunca van en el repo.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
skip_nonce_check = false
